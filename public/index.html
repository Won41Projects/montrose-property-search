<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Search — Montrose County</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1a2332;
      --muted: #5c6b7a;
      --accent: #1f4e79;
      --accent-hover: #163a5c;
      --border: #d7dee7;
      --error-bg: #fdecea;
      --error-text: #8a1f11;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #12161c;
        --panel: #1b222b;
        --text: #e8edf3;
        --muted: #9aa8b7;
        --accent: #5b9bd5;
        --accent-hover: #7ab0e0;
        --border: #2d3744;
        --error-bg: #3a1f1c;
        --error-text: #f2b8b0;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.75rem;
      font-weight: 650;
      line-height: 1.25;
    }

    .levy-detail {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    h2.section-title {
      margin: 0 0 8px;
      font-size: 1.15rem;
      font-weight: 600;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .search-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="search"] {
      flex: 1 1 280px;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: transparent;
      color: inherit;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: wait; }

    .hint {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status {
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .error {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--error-bg);
      color: var(--error-text);
    }

    .results {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .result-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }

    .result-card h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .result-card h2 a {
      color: var(--accent);
      text-decoration: none;
    }

    .result-card h2 a:hover { text-decoration: underline; }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .summary {
      margin: 10px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .match-type {
      display: inline-block;
      margin-bottom: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      color: var(--accent);
    }

    .warning {
      color: var(--error-text);
    }

    .tax-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .tax-stat {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 6%, transparent);
    }

    .tax-stat span {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }

    .tax-stat strong {
      font-size: 1rem;
    }

    .tax-stat.highlight {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .tax-note {
      margin: 10px 0 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .tax-note a {
      color: var(--accent);
    }

    footer {
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="page-title">Proposed West End Health Service District</h1>
      <p class="levy-detail" id="levy-detail">Loading levy information…</p>
      <h2 class="section-title">Property Search</h2>
      <p class="subtitle">Search by owner name, account number, or parcel number.</p>
    </header>

    <section class="search-panel">
      <form id="search-form">
        <input
          id="query"
          name="q"
          type="search"
          placeholder="e.g. Jane Doe, R0007980, 4269-302-00-055"
          autocomplete="off"
          required
        />
        <button type="submit" id="submit-btn">Search</button>
      </form>
      <p class="hint">Owner names work as first-last or last-first.</p>
    </section>

    <div id="status" class="status" hidden></div>
    <div id="error" class="error" hidden></div>
    <div id="results" class="results"></div>

    <footer>
      Data from
      <a href="https://eagleweb.montrosecounty.net/eagleassessor/web/" target="_blank" rel="noopener">EagleWeb</a>
      and
      <a href="https://treasurerweb.montrosecounty.net/treasurer/web/" target="_blank" rel="noopener">TreasurerWeb</a>.
      Senior exemption amounts come from TreasurerWeb tax bills.
    </footer>
  </main>

  <script>
    const form = document.getElementById("search-form");
    const queryInput = document.getElementById("query");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const resultsEl = document.getElementById("results");
    const pageTitleEl = document.getElementById("page-title");
    const levyDetailEl = document.getElementById("levy-detail");

    function renderPageHeader(levy) {
      if (!levy) return;

      if (levy.configured) {
        pageTitleEl.textContent = levy.label || "Proposed mill levy";
        levyDetailEl.innerHTML =
          `<strong>${levy.millLevy} mills</strong> — Estimated increases use each property's ` +
          `<em>Total Non-School Assessed Value</em> from EagleWeb (${levy.assessmentYear || "current year"}). ` +
          `When a senior property tax exemption applies, the estimate is reduced using exemption data from TreasurerWeb.`;
        document.title = `Property Search — ${levy.label || "Montrose County"}`;
        return;
      }

      pageTitleEl.textContent = levy.label || "Proposed mill levy";
      levyDetailEl.textContent = "Mill levy not configured.";
    }

    async function loadLevyHeader() {
      try {
        const response = await fetch("/api/levy");
        const levy = await response.json();
        renderPageHeader(levy);
      } catch {
        levyDetailEl.textContent =
          "20 mills — based on non-school assessed value (2026).";
      }
    }

    loadLevyHeader();

    function showStatus(text) {
      statusEl.hidden = !text;
      statusEl.textContent = text || "";
    }

    function showError(text) {
      errorEl.hidden = !text;
      errorEl.textContent = text || "";
    }

    function formatMoney(value) {
      if (value == null) return "—";
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2,
      }).format(value);
    }

    function renderResults(payload) {
      resultsEl.innerHTML = "";
      if (!payload.results?.length) return;

      for (const item of payload.results) {
        const card = document.createElement("article");
        card.className = "result-card";

        const assessed = item.assessment?.nonSchoolAssessedValue;
        const grossAnnual = item.levyImpact?.annualIncreaseGross;
        const netAnnual = item.levyImpact?.annualIncreaseNet ?? item.levyImpact?.annualIncrease;
        const grossMonthly = item.levyImpact?.monthlyIncreaseGross;
        const netMonthly = item.levyImpact?.monthlyIncreaseNet ?? item.levyImpact?.monthlyIncrease;
        const hasSenior = item.levyImpact?.hasSeniorExemption;
        const treasurerUrl = item.treasurer?.detailUrl;

        const increaseStats = hasSenior
          ? `
            <div class="tax-stat">
              <span>Est. annual (before exemption)</span>
              <strong>${payload.levy?.configured ? formatMoney(grossAnnual) : "Set mill levy"}</strong>
            </div>
            <div class="tax-stat highlight">
              <span>Est. annual (after senior exemption)</span>
              <strong>${payload.levy?.configured ? formatMoney(netAnnual) : "Set mill levy"}</strong>
            </div>
            <div class="tax-stat">
              <span>Est. monthly (after exemption)</span>
              <strong>${payload.levy?.configured ? formatMoney(netMonthly) : "—"}</strong>
            </div>
          `
          : `
            <div class="tax-stat">
              <span>Est. annual increase</span>
              <strong>${payload.levy?.configured ? formatMoney(netAnnual) : "Set mill levy"}</strong>
            </div>
            <div class="tax-stat">
              <span>Est. monthly increase</span>
              <strong>${payload.levy?.configured ? formatMoney(netMonthly) : "—"}</strong>
            </div>
          `;

        card.innerHTML = `
          <span class="match-type">${item.matchType}</span>
          <h2><a href="${item.detailUrl}" target="_blank" rel="noopener">${item.accountNumber}</a></h2>
          <p class="meta">${item.parcel || "Parcel unavailable"}</p>
          <p class="summary">${item.summary}</p>
          <div class="tax-grid">
            <div class="tax-stat">
              <span>Non-school assessed</span>
              <strong>${formatMoney(assessed)}</strong>
            </div>
            ${increaseStats}
          </div>
          ${hasSenior ? `<p class="tax-note">Senior exemption applied (${formatMoney(item.levyImpact.seniorExemption)} credit at ${payload.levy?.millLevy} mills). <a href="${treasurerUrl}" target="_blank" rel="noopener">View TreasurerWeb bill</a></p>` : ""}
        `;
        resultsEl.appendChild(card);
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const q = queryInput.value.trim();
      if (!q) return;

      submitBtn.disabled = true;
      showError("");
      showStatus("Searching EagleWeb, TreasurerWeb, and loading assessment values...");
      resultsEl.innerHTML = "";

      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.error || "Search failed.");
        }

        showStatus(payload.message || "");
        renderResults(payload);
      } catch (error) {
        showStatus("");
        showError(error.message || "Something went wrong.");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
